<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag Boxes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bigBox" data-rank="0">
        <div class="item" draggable="true">Diploma project</div>
        <div class="item" draggable="true">Buy cosmetics</div>
        <div class="item" draggable="true">Send message to trainer</div>
    </div>

    
    <div class="container">
        <div class="smallBox">
            <div class="box-header">To do</div>
            <div class="box-content" data-rank="1"></div>
        </div>
        <div class="smallBox">
            <div class="box-header">In progress</div>
            <div class="box-content" data-rank="2"></div>
        </div>
        <div class="smallBox">
            <div class="box-header">Done</div>
            <div class="box-content" data-rank="3"></div>
        </div>
        
    </div>

    <div id="error-message"></div>
    <button id="submitBtn">Submit</button>
    <script src="script.js"></script>
</body>
</html>
