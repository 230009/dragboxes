<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Drag Boxes</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="bigBox">
        <div class="item" draggable="true">Diploma project</div>
        <div class="item" draggable="true">Buy cosmetics</div>
        <div class="item" draggable="true">Message trainer</div>
    </div>

    
    <div class="container">
        <div class="smallBox">To do</div>
        <div class="smallBox">In process</div>
        <div class="smallBox">Done</div>
    </div>

    <div id="error-message"></div>
    <button id="submitBtn">Submit</button>
    <script src="script.js"></script>
</body>
</html>
